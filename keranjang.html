<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<script src="https://cdn.tailwindcss.com"></script>

<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&family=Inter:wght@400;500&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet"/>

<style>
body { background:#fcf8ff; }
.material-symbols-outlined { vertical-align:middle; }
</style>
</head>

<body class="font-[Inter]">
        <script>
                if (localStorage.getItem("login") !== "true") {
                  alert("Kamu harus login dulu!");
                  window.location.href = "login.html";
                }
                </script>
<!-- ================= NAVBAR ================= -->
<header class="fixed top-0 w-full bg-white shadow h-16 flex items-center justify-between px-8 z-50">
  <h1 class="font-bold text-indigo-600 text-xl">TokoKita</h1>

  <div class="flex gap-6 items-center">
    <a href="index.html">Beranda</a>
    <a href="produk.html">Produk</a>

    <a href="keranjang.html" class="relative">
      <span class="material-symbols-outlined">shopping_cart</span>
    </a>
  </div>
</header>

<!-- ================= CONTENT ================= -->
<main class="max-w-6xl mx-auto pt-24 px-6">

<h1 class="text-3xl font-bold mb-2">Keranjang Belanja</h1>
<p class="text-gray-500 mb-6">Cek kembali pesanan kamu sebelum checkout</p>

<div class="grid lg:grid-cols-3 gap-6">

<!-- ================= LIST PRODUK ================= -->
<div id="cart-items" class="lg:col-span-2 space-y-4">
  <!-- AUTO RENDER -->
</div>

<!-- ================= SUMMARY ================= -->
<div class="bg-white p-6 rounded-xl shadow h-fit">

<h2 class="font-bold mb-4 text-lg">Ringkasan</h2>

<div class="flex justify-between mb-2">
<span>Subtotal</span>
<span id="subtotal">Rp 0</span>
</div>

<div class="flex justify-between mb-4">
<span>Total</span>
<span id="total-harga" class="font-bold text-indigo-600">Rp 0</span>
</div>

<button onclick="checkout()"
class="w-full bg-indigo-600 text-white py-3 rounded-lg hover:bg-indigo-700">
Checkout
</button>

<a href="produk.html"
class="block text-center mt-3 text-sm text-gray-500">
Lanjut Belanja
</a>

</div>

</div>
</main>

<!-- ================= SCRIPT ================= -->
<script>

// ===== AMBIL DATA =====
function getCart() {
  return JSON.parse(localStorage.getItem("cart")) || [];
}

function saveCart(cart) {
  localStorage.setItem("cart", JSON.stringify(cart));
}

// ===== RENDER =====
function renderCart() {
  const cart = getCart();
  const container = document.getElementById("cart-items");
  const totalEl = document.getElementById("total-harga");
  const subtotalEl = document.getElementById("subtotal");

  container.innerHTML = "";
  let total = 0;

  if (cart.length === 0) {
    container.innerHTML = "<p class='text-center py-10'>Keranjang kosong</p>";
    totalEl.innerText = "Rp 0";
    subtotalEl.innerText = "Rp 0";
    return;
  }

  cart.forEach((item, index) => {
    total += item.price * item.qty;

    container.innerHTML += `
    <div class="bg-white p-4 rounded-xl shadow flex gap-4 items-center">

      <img src="${item.image}" class="w-24 h-24 object-cover rounded-lg">

      <div class="flex-1">
        <h3 class="font-semibold">${item.name}</h3>
        <p class="text-indigo-600 font-bold">Rp ${item.price.toLocaleString()}</p>

        <div class="flex items-center gap-3 mt-3">
          <button onclick="decreaseQty(${index})" class="px-2 bg-gray-200 rounded">-</button>
          <span>${item.qty}</span>
          <button onclick="increaseQty(${index})" class="px-2 bg-gray-200 rounded">+</button>
        </div>
      </div>

      <button onclick="removeItem(${index})" class="text-red-500">
        Hapus
      </button>

    </div>
    `;
  });

  totalEl.innerText = "Rp " + total.toLocaleString();
  subtotalEl.innerText = "Rp " + total.toLocaleString();
}

// ===== TAMBAH =====
function increaseQty(index) {
  let cart = getCart();
  cart[index].qty += 1;
  saveCart(cart);
  renderCart();
}

// ===== KURANG =====
function decreaseQty(index) {
  let cart = getCart();

  if (cart[index].qty > 1) {
    cart[index].qty -= 1;
  } else {
    cart.splice(index, 1);
  }

  saveCart(cart);
  renderCart();
}

// ===== HAPUS =====
function removeItem(index) {
  let cart = getCart();
  cart.splice(index, 1);
  saveCart(cart);
  renderCart();
}

function checkout() {
  let cart = getCart();

  if (cart.length === 0) {
    alert("Keranjang masih kosong!");
    return;
  }

  window.location.href = "checkout.html";
}

// ===== LOAD =====
document.addEventListener("DOMContentLoaded", renderCart);

</script>

</body>
</html>
