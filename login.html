<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Login - TokoKita</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="flex items-center justify-center h-screen bg-gray-100">

<div class="bg-white p-8 rounded-xl shadow w-80">
  <h2 class="text-xl font-bold mb-4">Login</h2>

  <input id="email" class="w-full border p-2 mb-2" placeholder="Email">
  <input id="password" type="password" class="w-full border p-2 mb-4" placeholder="Password">

  <button onclick="login()" class="w-full bg-indigo-600 text-white p-2 rounded">
    Login
  </button>

  <p class="text-sm mt-3 text-center">
    Belum punya akun? <a href="register.html" class="text-indigo-600">Register</a>
  </p>
</div>

<script>
function login() {
  let email = document.getElementById("email").value;
  let password = document.getElementById("password").value;

  let users = JSON.parse(localStorage.getItem("users")) || [];

  // 🔥 ADMIN FIX ACCOUNT (biar ada admin)
  if(email === "admin@tokokita.com" && password === "admin123") {
    localStorage.setItem("login", "true");
    localStorage.setItem("role", "admin");
    window.location.href = "admin.html";
    return;
  }

  let user = users.find(u => u.email === email && u.password === password);

  if(!user) {
    alert("Login gagal!");
    return;
  }

  localStorage.setItem("login", "true");
  localStorage.setItem("role", user.role);
  localStorage.setItem("name", user.name);

  window.location.href = "index.html";
}
</script>

</body>
</html>
